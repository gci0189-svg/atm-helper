<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATM 短溢款分析助手 v14.0</title>
    <style>
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: #f0f4f8; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 1050px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h1 { color: #2c3e50; text-align: center; margin-bottom: 25px; border-bottom: 3px solid #3498db; padding-bottom: 15px; }
        .section { background: #ffffff; padding: 20px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #dcdfe6; }
        .section h2 { margin-top: 0; color: #2980b9; font-size: 18px; margin-bottom: 15px; }
        .form-group { display: flex; gap: 15px; margin-bottom: 15px; flex-wrap: wrap; }
        .input-item { display: flex; flex-direction: column; flex: 1; min-width: 300px; }
        label { font-weight: bold; margin-bottom: 8px; color: #555; font-size: 14px; }
        input[type="text"], input[type="file"] { padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; font-family: 'Courier New', monospace; }
        .btn { background-color: #3498db; color: white; padding: 15px; border: none; border-radius: 6px; cursor: pointer; font-size: 18px; font-weight: bold; width: 100%; transition: 0.3s; margin-top: 10px; }
        .btn:hover { background-color: #2980b9; }
        .btn-auto { background-color: #27ae60; color: white; padding: 8px 15px; border: none; border-radius: 6px; cursor: pointer; }

        .summary-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px; }
        .card { padding: 20px; border-radius: 10px; color: white; }
        .card.thousand { background: linear-gradient(135deg, #e67e22, #d35400); }
        .card.hundred { background: linear-gradient(135deg, #3498db, #2980b9); }
        .card-title { font-size: 16px; font-weight: bold; margin-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.3); padding-bottom: 5px; }
        .card-stats { display: flex; justify-content: space-around; }
        .stat-group { text-align: center; }
        .stat-value { font-size: 32px; font-weight: bold; display: block; }
        .total-amount { grid-column: span 2; background: #2c3e50; text-align: center; padding: 15px; border-radius: 10px; color: white; font-size: 22px; font-weight: bold; }

        /* RACT 差異分析專區 */
        .ract-audit { background: #fdf6ec; border: 1px solid #faecd8; border-radius: 8px; padding: 20px; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; }
        .audit-info { font-size: 15px; color: #495057; }
        .audit-highlight { font-size: 20px; font-weight: bold; color: #cf9236; }
        .audit-warning { color: #f56c6c; font-weight: bold; background: white; padding: 10px; border-radius: 6px; border: 2px solid #f56c6c; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #eee; padding: 12px; text-align: center; font-size: 14px; }
        th { background-color: #f8f9fa; }
        #warningArea { display: none; background-color: #fff5f5; border: 1px solid #feb2b2; border-left: 5px solid #f56c6c; padding: 15px; margin-top: 20px; border-radius: 5px; }
        .warning-item { margin-bottom: 5px; font-size: 13px; list-style: none; border-bottom: 1px dashed #fed7d7; }
    </style>
</head>
<body>

<div class="container">
    <h1>🏧 ATM 短溢款分析助手 (v14.0 差額精算版)</h1>

    <div class="section">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <h2 style="margin: 0;">1. 設定分析區間</h2>
            <button class="btn-auto" onclick="autoDetect()">🪄 自動填入時間</button>
        </div>
        <div class="form-group">
            <div class="input-item">
                <label>裝鈔時間 (起始)</label>
                <input type="text" id="startFull" placeholder="YYYY-MM-DD HH:MM:SS">
            </div>
            <div class="input-item">
                <label>卸鈔時間 (結束)</label>
                <input type="text" id="endFull" placeholder="YYYY-MM-DD HH:MM:SS">
            </div>
        </div>
    </div>

    <div class="section">
        <h2>2. 選擇日誌檔案</h2>
        <input type="file" id="fileInput" multiple>
        <button class="btn" onclick="startAnalysis()">開始執行深度稽核分析</button>
    </div>

    <div id="resultSection" style="display: none;">
        <!-- RACT 實張稽核 -->
        <div class="ract-audit">
            <div class="audit-info">
                📑 <b>拒鈔箱「實張新增」稽核：</b><br>
                區間起點 RACT: <span id="startRact" class="audit-highlight">0</span> 張 | 
                區間終點 RACT: <span id="endRact" class="audit-highlight">0</span> 張<br>
                <span style="color:#2c3e50">此時段內「物理上」進入拒鈔箱總數：</span> <span id="realRactDiff" style="font-size:24px; font-weight:bold; color:#27ae60;">0</span> 張
            </div>
            <div id="auditAlert" class="audit-warning" style="display:none;">
                ⚠️ 警報：RACT 增加張數 與 交易拒鈔(nREJ) 不符！
            </div>
        </div>

        <div class="summary-container">
            <div class="card thousand">
                <div class="card-title">仟元券統計 ($1000)</div>
                <div class="card-stats">
                    <div class="stat-group"><span class="stat-value" id="disp1000">0</span><span>發出張數</span></div>
                    <div class="stat-group"><span class="stat-value" id="rej1000">0</span><span>交易拒鈔</span></div>
                </div>
            </div>
            <div class="card hundred">
                <div class="card-title">佰元券統計 ($100)</div>
                <div class="card-stats">
                    <div class="stat-group"><span class="stat-value" id="disp100">0</span><span>發出張數</span></div>
                    <div class="stat-group"><span class="stat-value" id="rej100">0</span><span>交易拒鈔</span></div>
                </div>
            </div>
            <div class="total-amount">提領金額總計：<span id="totalMoney" style="color: #2ecc71;">NT$ 0</span></div>
        </div>

        <div class="section">
            <h2>📊 各鈔箱交易明細</h2>
            <table>
                <thead>
                    <tr><th>鈔箱</th><th>面額</th><th>狀態</th><th>發出</th><th>拒鈔(nREJ)</th><th>合計</th></tr>
                </thead>
                <tbody id="resultTableBody"></tbody>
            </table>
        </div>

        <div id="warningArea">
            <h3 style="color: #c53030; margin-top: 0;">⚠️ 關鍵異常報告 (偵測 RACT:0110)</h3>
            <div id="warningList"></div>
        </div>
    </div>
</div>

<script>
    let combinedLogs = "";

    document.getElementById('fileInput').addEventListener('change', function(e) {
        let files = Array.from(e.target.files);
        files.sort((a, b) => a.name.localeCompare(b.name));
        combinedLogs = "";
        let loaded = 0;
        files.forEach(f => {
            const r = new FileReader();
            r.onload = (event) => {
                combinedLogs += event.target.result + "\n";
                loaded++;
            };
            r.readAsText(f);
        });
    });

    function autoDetect() {
        if (!combinedLogs) return;
        const regex = /date="([^"]+)" time="([^"]+)"/g;
        let matches = [...combinedLogs.matchAll(regex)];
        if (matches.length > 0) {
            document.getElementById('startFull').value = matches[0][1] + " " + matches[0][2];
            document.getElementById('endFull').value = matches[matches.length-1][1] + " " + matches[matches.length-1][2];
        }
    }

    function startAnalysis() {
        if (!combinedLogs) return;
        const startTs = new Date(document.getElementById('startFull').value.trim().replace(' ', 'T')).getTime();
        const endTs = new Date(document.getElementById('endFull').value.trim().replace(' ', 'T')).getTime();

        let summary = { 1:{d:0, r:0, v:0, s:''}, 2:{d:0, r:0, v:0, s:''}, 3:{d:0, r:0, v:0, s:''}, 4:{d:0, r:0, v:0, s:''} };
        let warnings = [];
        let prevTokens = [];
        let firstRACT = -1, lastRACT = -1;
        let sumNRej = 0;
        
        const lines = combinedLogs.split('\n');

        lines.forEach(line => {
            let m = line.match(/date="([^"]+)" time="([^"]+)"/);
            if (!m) return;
            let logTs = new Date(`${m[1]}T${m[2]}`).getTime();
            if (logTs < startTs || logTs > endTs) return;

            // 抓取 RACT 數值
            let ractM = line.match(/RACT=([0-9]+)/);
            if (ractM) {
                let rVal = parseInt(ractM[1]);
                if (firstRACT === -1) firstRACT = rVal;
                lastRACT = rVal;
            }

            // 抓取 0110 代碼
            if (line.includes('RACT=0110')) {
                warnings.push(`[${m[2]}] ⚠️ 偵測到通道殘留鈔票代碼 (RACT:0110)`);
            }

            // 偵測 VAL
            for(let i=1; i<=4; i++) {
                let vM = line.match(new RegExp(`${i}VAL=0*(\\d+)`));
                if (vM) summary[i].v = parseInt(vM[1]);
                let sM = line.match(new RegExp(`${i}STA=([A-Z])`));
                if (sM) summary[i].s = sM[1];
            }

            // 統計發鈔
            if (line.includes('CNG_DISP_STANDARD')) {
                let dM = line.match(/>([^<]+)<\/ENTRY>/);
                if (dM) {
                    let tokens = dM[1].replace(/;/g, '').split(':').filter(t => t.trim() !== "");
                    tokens.forEach(tk => {
                        if (tk.endsWith('E') && prevTokens.includes(tk)) return;
                        let p = tk.split(',');
                        if (p.length >= 3) {
                            let idx = parseInt(p[0]);
                            if (summary[idx]) { 
                                summary[idx].d += parseInt(p[1]); 
                                summary[idx].r += parseInt(p[2]); 
                                sumNRej += parseInt(p[2]);
                            }
                        }
                    });
                    prevTokens = tokens;
                }
            }
            if (line.includes('MON=W')) warnings.push(`[${m[2]}] ℹ️ 客戶手動取錢`);
        });

        renderFinal(summary, [...new Set(warnings)], firstRACT, lastRACT, sumNRej);
    }

    function renderFinal(summary, warnings, firstR, lastR, sumN) {
        document.getElementById('resultSection').style.display = 'block';
        const tbody = document.getElementById('resultTableBody');
        tbody.innerHTML = '';
        let d1000=0, r1000=0, d100=0, r100=0, totalM=0;

        for (let i = 1; i <= 4; i++) {
            let s = summary[i];
            totalM += (s.d * s.v);
            if (s.v === 1000) { d1000 += s.d; r1000 += s.r; }
            else if (s.v === 100) { d100 += s.d; r100 += s.r; }
            tbody.innerHTML += `<tr><td>第 ${i} 箱</td><td>$${s.v || '?'}</td><td>${s.s || '-'}</td><td>${s.d}</td><td>${s.r}</td><td>${s.d+s.r}</td></tr>`;
        }

        document.getElementById('disp1000').innerText = d1000;
        document.getElementById('rej1000').innerText = r1000;
        document.getElementById('disp100').innerText = d100;
        document.getElementById('rej100').innerText = r100;
        document.getElementById('totalMoney').innerText = 'NT$ ' + totalM.toLocaleString();

        // RACT 差額稽核
        let realDiff = (lastR >= firstR && firstR !== -1) ? (lastR - firstR) : 0;
        document.getElementById('startRact').innerText = firstR === -1 ? 0 : firstR;
        document.getElementById('endRact').innerText = lastR === -1 ? 0 : lastR;
        document.getElementById('realRactDiff').innerText = realDiff;
        
        document.getElementById('auditAlert').style.display = (realDiff !== sumN) ? 'block' : 'none';

        const wArea = document.getElementById('warningArea');
        const wList = document.getElementById('warningList');
        wList.innerHTML = '';
        if (warnings.length > 0) {
            wArea.style.display = 'block';
            warnings.forEach(w => { wList.innerHTML += `<div class="warning-item">${w}</div>`; });
        } else { wArea.style.display = 'none'; }
        document.getElementById('resultSection').scrollIntoView({ behavior: 'smooth' });
    }
</script>
</body>
</html>
